<!DOCTYPE html>
<html lang="en">

<head>
    <style>
        /* help modal button */
        .active {
            margin: 6px 0px;
            padding: 4px 16px;
        }

        /* help modal header */
        .help-number {
            font-size: smaller;
        }
    </style>
</head>

<body>
    <!-- Home Help Page 1 -->
    <div class="modal fade" id="homeHelpToggle" aria-hidden="true" aria-labelledby="Help" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="exampleModalToggleLabel"><span class="help-number text-muted">#1:</span>
                        10 Nearest Masjids</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    Show a second modal and hide this one with the button below.
                </div>
                <div class="modal-footer">
                    <button class="btn btn-primary" data-bs-target="#exampleModalToggle2" data-bs-toggle="modal"
                        data-bs-dismiss="modal">Open second modal</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Home Help Page 2 -->
    <div class="modal fade" id="exampleModalToggle2" aria-hidden="true" aria-labelledby="exampleModalToggleLabel2"
        tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="exampleModalToggleLabel2">Modal 2</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    Hide this modal and show the first with the button below.
                </div>
                <div class="modal-footer">
                    <button class="btn btn-primary" data-bs-target="#exampleModalToggle" data-bs-toggle="modal"
                        data-bs-dismiss="modal">Back to first</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Home Help Button -->
    <ul class="nav nav-pills">
        <li class="nav-item"><a href="#homeHelpToggle" class="nav-link bg-info active" data-bs-toggle="modal"
                aria-current="page">Help</a></li>
    </ul>

</body>

</html>
